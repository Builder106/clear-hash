<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#11182e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="900" y1="0" x2="900" y2="420"/>
  </g>

  <!-- logo mark: shield + hash -->
  <g transform="translate(80, 120)">
    <path d="M 90,0 L 180,30 L 180,120 Q 180,170 90,210 Q 0,170 0,120 L 0,30 Z"
          fill="none" stroke="url(#accent)" stroke-width="4" filter="url(#glow)"/>
    <text x="90" y="135" text-anchor="middle" fill="url(#accent)"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="64" font-weight="700"
          filter="url(#glow)">#</text>
  </g>

  <!-- wordmark -->
  <text x="320" y="200" fill="#f8fafc"
        font-family="ui-sans-serif, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="92" font-weight="800" letter-spacing="-2">ClearHash</text>

  <!-- tagline -->
  <text x="320" y="245" fill="#94a3b8"
        font-family="ui-sans-serif, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="400">
    Rebuild every package. Compare every byte. Block every tamper.
  </text>

  <!-- terminal-ish snippet -->
  <g transform="translate(320, 290)" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <text x="0" y="0" fill="#64748b" font-size="18">$ </text>
    <text x="20" y="0" fill="#e2e8f0" font-size="18">clearhash verify </text>
    <text x="200" y="0" fill="#7dd3fc" font-size="18">npm:sigstore@2.3.1</text>
    <text x="0" y="32" fill="#22c55e" font-size="18">✓ MATCH </text>
    <text x="80" y="32" fill="#94a3b8" font-size="18">tree-hash ec714016d7e4ce74…</text>
  </g>
</svg>
